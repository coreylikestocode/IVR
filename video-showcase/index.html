<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island View Retreat — Video Stories</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --card-w: 220px;
    --card-h: 420px;
    --card-radius: 28px;
    --gap: 18px;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #080a0c;
    color: #fff;
    margin: 0;
  }

  /* ── section wrapper ── */
  .video-section {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: 60px 0 50px;
    gap: 28px;
  }

  /* ── background layers ── */
  .bg-photo {
    position: absolute;
    inset: -40px;
    z-index: 0;
    background: url('bg-sunrise.jpg') center center / cover no-repeat;
    filter: blur(6px) saturate(1.2);
    animation: bgDrift 30s ease-in-out infinite alternate;
  }

  @keyframes bgDrift {
    0%   { transform: scale(1.05) translate(0, 0); }
    50%  { transform: scale(1.08) translate(-10px, 5px); }
    100% { transform: scale(1.05) translate(5px, -5px); }
  }

  .bg-darken {
    position: absolute;
    inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(0,0,0,.35) 0%, rgba(0,0,0,.7) 70%),
      linear-gradient(to bottom, rgba(0,0,0,.6) 0%, rgba(0,0,0,.2) 30%, rgba(0,0,0,.2) 70%, rgba(0,0,0,.75) 100%);
  }

  .bg-grain {
    position: absolute;
    inset: 0; z-index: 2;
    opacity: .06;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* warm glow behind the carousel */
  .bg-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,160,60,.12) 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  /* ── title ── */
  .section-header {
    position: relative; z-index: 5;
    text-align: center;
    opacity: 0;
    animation: fadeUp .8s .3s forwards;
  }
  .section-label {
    display: inline-block;
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(255,180,80,.8);
    background: rgba(255,180,80,.1);
    border: 1px solid rgba(255,180,80,.2);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .section-header h2 {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: .04em;
    color: #fff;
    margin-bottom: 8px;
  }
  .section-header h2 strong {
    font-weight: 600;
    background: linear-gradient(135deg, #ffd6a0, #ffb366);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .section-header p {
    font-size: .85rem;
    color: rgba(255,255,255,.5);
    font-weight: 300;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── carousel track ── */
  .carousel-viewport {
    position: relative; z-index: 5;
    width: 100%;
    overflow: visible;
    opacity: 0;
    animation: fadeUp 1s .5s forwards;
  }

  .carousel-track {
    position: relative;
    width: 100%;
    height: var(--card-h);
  }

  /* ── cards ── */
  .card {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--card-radius);
    left: 50%;
    top: 0;
    cursor: pointer;
    transition: transform .55s cubic-bezier(.4,0,.15,1),
                opacity .55s ease,
                filter .55s ease;
  }
  .card.no-transition { transition: none; }

  .card-frame {
    position: absolute; inset: 0;
    border-radius: var(--card-radius);
    background: linear-gradient(145deg, #2a2a30 0%, #1a1a20 50%, #2a2a30 100%);
    padding: 8px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 15px 50px rgba(0,0,0,.6),
      0 0 40px rgba(255,160,60,.06),
      inset 0 1px 0 rgba(255,255,255,.1);
    overflow: hidden;
  }

  .card-screen {
    width: 100%; height: 100%;
    border-radius: calc(var(--card-radius) - 8px);
    overflow: hidden;
    position: relative;
    background: #000;
  }

  .card-screen video {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  .card-island {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 20px;
    background: #000;
    border-radius: 14px;
    z-index: 20;
    box-shadow: 0 0 0 1px rgba(255,255,255,.05);
  }

  .card-glare {
    position: absolute;
    top: -20%; left: -20%;
    width: 140%; height: 60%;
    background: linear-gradient(135deg, rgba(255,255,255,.07) 0%, transparent 50%);
    border-radius: calc(var(--card-radius) - 8px);
    pointer-events: none; z-index: 12;
  }

  .card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 140px;
    background: linear-gradient(transparent, rgba(0,0,0,.75));
    pointer-events: none;
    border-radius: 0 0 calc(var(--card-radius) - 8px) calc(var(--card-radius) - 8px);
  }

  .card-caption {
    position: absolute;
    bottom: 14px; left: 12px; right: 12px;
    z-index: 10; color: #fff;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .4s, transform .4s;
  }
  .card.active .card-caption {
    opacity: 1; transform: translateY(0);
  }
  .card-caption h3 {
    font-size: .7rem; font-weight: 600;
    letter-spacing: .05em; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .card-caption p {
    font-size: .6rem; font-weight: 300;
    color: rgba(255,255,255,.7); line-height: 1.3;
  }

  .card-progress {
    position: absolute;
    top: 36px; left: 10px; right: 10px;
    display: flex; gap: 3px;
    z-index: 20;
    opacity: 0;
    transition: opacity .4s;
  }
  .card.active .card-progress { opacity: 1; }

  .prog-track {
    flex: 1; height: 2px;
    background: rgba(255,255,255,.2);
    border-radius: 2px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; width: 0%;
    background: #fff; border-radius: 2px;
  }
  .prog-track.done .prog-fill { width: 100%; }
  .prog-track.future .prog-fill { width: 0%; }

  .card-btn-power {
    position: absolute; right: -2px; top: 100px;
    width: 2px; height: 40px;
    background: linear-gradient(180deg, #3a3a40, #2a2a30);
    border-radius: 0 2px 2px 0;
  }
  .card-btn-vol1,
  .card-btn-vol2 {
    position: absolute; left: -2px; width: 2px;
    background: linear-gradient(180deg, #3a3a40, #2a2a30);
    border-radius: 2px 0 0 2px;
  }
  .card-btn-vol1 { top: 85px; height: 26px; }
  .card-btn-vol2 { top: 118px; height: 26px; }

  /* ── bottom controls ── */
  .bottom-area {
    position: relative; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    opacity: 0; animation: fadeUp .8s 1s forwards;
  }

  .dots {
    display: flex; gap: 8px; justify-content: center;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.2);
    transition: all .3s ease; cursor: pointer;
  }
  .dot.active {
    background: rgba(255,200,120,1);
    box-shadow: 0 0 10px rgba(255,180,80,.5);
    transform: scale(1.2);
  }

  .controls {
    display: flex; align-items: center; gap: 20px;
  }
  .ctrl-btn {
    width: 40px; height: 40px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    background: rgba(255,255,255,.05);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
    backdrop-filter: blur(10px);
  }
  .ctrl-btn:hover {
    background: rgba(255,255,255,.12);
    border-color: rgba(255,180,80,.4);
    transform: scale(1.08);
  }
  .ctrl-btn svg { width: 16px; height: 16px; fill: rgba(255,255,255,.7); }
  .ctrl-btn.play-pause svg { width: 20px; height: 20px; }

  .slide-counter {
    font-size: .7rem; font-weight: 400;
    color: rgba(255,255,255,.4);
    letter-spacing: .1em; min-width: 40px; text-align: center;
  }

  /* ── responsive ── */
  @media (min-width: 500px) {
    :root { --card-w: 260px; --card-h: 500px; --gap: 22px; }
    .section-header h2 { font-size: 2.2rem; }
  }
  @media (min-width: 768px) {
    :root { --card-w: 300px; --card-h: 580px; --gap: 28px; --card-radius: 34px; }
    .section-header h2 { font-size: 2.6rem; }
    .card-island { width: 85px; height: 24px; top: 11px; }
  }
  @media (min-width: 1100px) {
    :root { --card-w: 320px; --card-h: 640px; --gap: 34px; }
    .section-header h2 { font-size: 3rem; }
  }
</style>
</head>
<body>

<section class="video-section">
  <!-- layered background -->
  <div class="bg-photo"></div>
  <div class="bg-darken"></div>
  <div class="bg-grain"></div>
  <div class="bg-glow"></div>

  <!-- section title -->
  <div class="section-header">
    <span class="section-label">Captured on Location</span>
    <h2>See It Through <strong>Their Eyes</strong></h2>
    <p>Real videos from guests at the cottage. No filters, no staging — just the experience.</p>
  </div>

  <!-- carousel -->
  <div class="carousel-viewport">
    <div class="carousel-track" id="track"></div>
  </div>

  <!-- controls -->
  <div class="bottom-area">
    <div class="dots" id="dots"></div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" aria-label="Play/Pause">
        <svg viewBox="0 0 24 24" id="playIcon" style="display:none"><path d="M8 5v14l11-7z"/></svg>
        <svg viewBox="0 0 24 24" id="pauseIcon"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <span class="slide-counter" id="slideCounter">1 / 6</span>
      <button class="ctrl-btn" id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </button>
    </div>
  </div>
</section>

<script>
const videos = [
  { src: 'video-1.mp4', title: 'Cinematic Shores',  desc: 'Golden hour on Big Gull Lake' },
  { src: 'video-2.mp4', title: 'Morning Mist',      desc: 'Sunrise over still waters' },
  { src: 'video-3.mp4', title: 'Cottage Life',      desc: 'Relax, unwind, reconnect' },
  { src: 'video-4.mp4', title: 'Waterfront Magic',  desc: 'Where forest meets lake' },
  { src: 'video-5.mp4', title: 'Island Adventures', desc: 'Explore by canoe & kayak' },
  { src: 'video-6.mp4', title: 'Sunset Stories',    desc: 'End the day in paradise' },
];

const n = videos.length;
const track   = document.getElementById('track');
const dotsEl  = document.getElementById('dots');
const counter = document.getElementById('slideCounter');
const playIcon  = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');

let current = 0;
let isPlaying = true;
let progressRAF = null;

videos.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = i;

  let progHTML = '<div class="card-progress">';
  videos.forEach(() => {
    progHTML += '<div class="prog-track future"><div class="prog-fill"></div></div>';
  });
  progHTML += '</div>';

  card.innerHTML = `
    <div class="card-frame">
      <div class="card-screen">
        <div class="card-island"></div>
        ${progHTML}
        <video src="${v.src}" playsinline muted loop preload="${i < 3 ? 'auto' : 'metadata'}"></video>
        <div class="card-glare"></div>
        <div class="card-overlay"></div>
        <div class="card-caption">
          <h3>${v.title}</h3>
          <p>${v.desc}</p>
        </div>
      </div>
    </div>
    <div class="card-btn-power"></div>
    <div class="card-btn-vol1"></div>
    <div class="card-btn-vol2"></div>
  `;

  card.addEventListener('click', () => {
    const off = wrappedOffset(i, mod(current, n));
    if (off !== 0) goTo(current + off);
  });

  track.appendChild(card);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.addEventListener('click', () => {
    const off = wrappedOffset(i, mod(current, n));
    goTo(current + off);
  });
  dotsEl.appendChild(dot);
});

const cards     = [...track.querySelectorAll('.card')];
const allVideos = track.querySelectorAll('video');
const allDots   = dotsEl.querySelectorAll('.dot');

function mod(val, m) { return ((val % m) + m) % m; }

function wrappedOffset(index, from) {
  let diff = index - from;
  if (diff > n / 2)  diff -= n;
  if (diff < -n / 2) diff += n;
  return diff;
}

function getStep() {
  const s = getComputedStyle(document.documentElement);
  return parseFloat(s.getPropertyValue('--card-w')) + parseFloat(s.getPropertyValue('--gap'));
}

function layoutCards(extraShift) {
  extraShift = extraShift || 0;
  const step  = getStep();
  const cardW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const halfW = cardW / 2;
  const ci    = mod(current, n);

  cards.forEach((card, i) => {
    const off    = wrappedOffset(i, ci);
    const x      = off * step + extraShift - halfW;
    const absOff = Math.abs(off);

    let scale, opacity, brightness, sat, z;
    if (absOff === 0) {
      scale = 1; opacity = 1; brightness = 1; sat = 1; z = 10;
    } else if (absOff === 1) {
      scale = .85; opacity = .65; brightness = .7; sat = .8; z = 5;
    } else {
      scale = .75; opacity = .35; brightness = .55; sat = .6; z = 1;
    }

    card.style.transform = `translateX(${x}px) scale(${scale})`;
    card.style.opacity = opacity;
    card.style.filter = `brightness(${brightness}) saturate(${sat})`;
    card.style.zIndex = z;
    card.style.cursor = absOff === 0 ? 'default' : 'pointer';
  });
}

function goTo(rawIndex) {
  allVideos[mod(current, n)].pause();
  allDots[mod(current, n)].classList.remove('active');

  current = rawIndex;
  const ci = mod(current, n);

  layoutCards();

  allDots[ci].classList.add('active');
  counter.textContent = `${ci + 1} / ${n}`;

  const activeTracks = cards[ci].querySelectorAll('.prog-track');
  activeTracks.forEach((t, j) => {
    t.classList.remove('done', 'future');
    const fill = t.querySelector('.prog-fill');
    if (j < ci) { t.classList.add('done'); fill.style.width = '100%'; }
    else if (j > ci) { t.classList.add('future'); fill.style.width = '0%'; }
    else { fill.style.width = '0%'; }
  });

  if (isPlaying) {
    allVideos[ci].currentTime = 0;
    allVideos[ci].play().catch(() => {});
  }
  updateProgress();
}

function updateProgress() {
  if (progressRAF) cancelAnimationFrame(progressRAF);
  const ci = mod(current, n);

  function tick() {
    const vid = allVideos[ci];
    if (vid.duration) {
      const pct = (vid.currentTime / vid.duration) * 100;
      const fill = cards[ci].querySelectorAll('.prog-track')[ci]?.querySelector('.prog-fill');
      if (fill) fill.style.width = pct + '%';
      if (vid.currentTime >= vid.duration - 0.15) { goTo(current + 1); return; }
    }
    progressRAF = requestAnimationFrame(tick);
  }
  progressRAF = requestAnimationFrame(tick);
}

function togglePlay() {
  isPlaying = !isPlaying;
  playIcon.style.display  = isPlaying ? 'none' : 'block';
  pauseIcon.style.display = isPlaying ? 'block' : 'none';
  const ci = mod(current, n);
  if (isPlaying) { allVideos[ci].play().catch(() => {}); updateProgress(); }
  else { allVideos[ci].pause(); if (progressRAF) cancelAnimationFrame(progressRAF); }
}

document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
document.getElementById('playPauseBtn').addEventListener('click', togglePlay);

// drag / swipe
let startX = 0, isDragging = false, dragDelta = 0;

function onDragStart(x) {
  startX = x; isDragging = true; dragDelta = 0;
  cards.forEach(c => c.classList.add('no-transition'));
}
function onDragMove(x) {
  if (!isDragging) return;
  dragDelta = x - startX;
  layoutCards(dragDelta);
}
function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  cards.forEach(c => c.classList.remove('no-transition'));
  if (Math.abs(dragDelta) > getStep() * 0.2) {
    goTo(dragDelta < 0 ? current + 1 : current - 1);
  } else { layoutCards(); }
  dragDelta = 0;
}

track.addEventListener('mousedown', e => { onDragStart(e.clientX); e.preventDefault(); });
window.addEventListener('mousemove', e => onDragMove(e.clientX));
window.addEventListener('mouseup', onDragEnd);
track.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX), { passive: true });
track.addEventListener('touchmove', e => onDragMove(e.touches[0].clientX), { passive: true });
track.addEventListener('touchend', onDragEnd);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

window.addEventListener('resize', () => layoutCards());

// init
layoutCards();
allVideos[0].play().catch(() => {
  isPlaying = false;
  playIcon.style.display = 'block';
  pauseIcon.style.display = 'none';
});
updateProgress();

document.addEventListener('click', function firstPlay() {
  if (!isPlaying) togglePlay();
}, { once: true });
</script>
</body>
</html>
