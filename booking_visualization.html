<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island View Retreat — 2026 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2332;
    --surface2: #243044;
    --border: #2d3f56;
    --text: #e8edf3;
    --text-dim: #8899aa;
    --booked: #10b981;
    --booked-bg: rgba(16, 185, 129, 0.12);
    --personal: #3b82f6;
    --personal-bg: rgba(59, 130, 246, 0.12);
    --open: #ef4444;
    --open-bg: rgba(239, 68, 68, 0.10);
    --critical: #f59e0b;
    --critical-bg: rgba(245, 158, 11, 0.15);
    --high: #f97316;
    --moderate: #8b5cf6;
    --low: #6b7280;
    --accent: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .stat-card .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.25rem; }
  .stat-card .sub { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.15rem; }
  .stat-card.highlight { border-color: var(--accent); }
  .stat-card.highlight .value { color: var(--accent); }
  .stat-card.danger { border-color: var(--open); }
  .stat-card.danger .value { color: var(--open); }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 3px;
  }
  .legend-dot.booked { background: var(--booked); }
  .legend-dot.personal { background: var(--personal); }
  .legend-dot.open { background: var(--open); }
  .legend-dot.gap-critical { background: var(--critical); }

  .grid-container { overflow-x: auto; margin-bottom: 2rem; }
  table.booking-grid {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.82rem;
  }
  table.booking-grid th {
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 0.75rem 0.6rem;
    text-align: left;
    position: sticky;
    top: 0;
    z-index: 2;
    border-bottom: 2px solid var(--border);
  }
  table.booking-grid th:first-child { border-radius: 8px 0 0 0; }
  table.booking-grid th:last-child { border-radius: 0 8px 0 0; }
  table.booking-grid th.year-2026 { color: var(--accent); border-bottom-color: var(--accent); }

  table.booking-grid td {
    padding: 0.55rem 0.6rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    white-space: nowrap;
  }
  table.booking-grid tr:last-child td { border-bottom: none; }
  table.booking-grid td.period-cell {
    font-weight: 700;
    color: var(--text);
    min-width: 110px;
    background: var(--surface);
    position: sticky;
    left: 0;
    z-index: 1;
  }
  table.booking-grid td.dates-cell {
    color: var(--text-dim);
    font-size: 0.75rem;
    min-width: 85px;
  }

  .cell-booked { background: var(--booked-bg); border-left: 3px solid var(--booked); }
  .cell-personal { background: var(--personal-bg); border-left: 3px solid var(--personal); }
  .cell-open { background: transparent; border-left: 3px solid transparent; }
  .cell-gap { background: var(--open-bg); border-left: 3px solid var(--open); }
  .cell-gap-critical { background: var(--critical-bg); border-left: 3px solid var(--critical); }

  .cell-guest { font-weight: 500; display: block; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .cell-revenue { color: var(--booked); font-weight: 700; font-size: 0.78rem; }
  .cell-revenue.personal { color: var(--personal); }
  .cell-revenue.none { color: var(--text-dim); }
  .cell-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    margin-top: 0.2rem;
  }
  .tag-critical { background: rgba(245,158,11,0.2); color: var(--critical); }
  .tag-high { background: rgba(249,115,22,0.2); color: var(--high); }
  .tag-moderate { background: rgba(139,92,246,0.2); color: var(--moderate); }
  .tag-low { background: rgba(107,114,128,0.2); color: var(--low); }

  .gap-detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  .gap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    transition: border-color 0.2s;
  }
  .gap-card:hover { border-color: var(--accent); }
  .gap-card.priority-CRITICAL { border-left: 4px solid var(--critical); }
  .gap-card.priority-HIGH { border-left: 4px solid var(--high); }
  .gap-card.priority-MODERATE { border-left: 4px solid var(--moderate); }
  .gap-card.priority-LOW { border-left: 4px solid var(--low); }
  .gap-card .gc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
  .gap-card .gc-period { font-weight: 700; font-size: 1rem; }
  .gap-card .gc-dates { color: var(--text-dim); font-size: 0.8rem; }
  .gap-card .gc-list-rate { color: var(--text-dim); font-size: 0.85rem; }
  .gap-card .gc-list-rate strong { color: var(--text); }
  .gap-card .gc-history { margin-top: 0.5rem; }
  .gc-history-row {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    font-size: 0.8rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .gc-history-row:last-child { border-bottom: none; }
  .gc-history-row .yr { color: var(--text-dim); width: 40px; }
  .gc-history-row .guest { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gc-history-row .rev { font-weight: 600; min-width: 65px; text-align: right; }
  .gc-history-row .rev.paid { color: var(--booked); }
  .gc-history-row .rev.zero { color: var(--text-dim); }
  .gc-stats { display: flex; gap: 1rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .gc-stat { text-align: center; flex: 1; }
  .gc-stat .val { font-size: 1.1rem; font-weight: 700; }
  .gc-stat .lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }

  /* Pricing Section */
  .pricing-section {
    margin-top: 2rem;
  }
  .pricing-summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .pricing-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
  }
  .pricing-summary-card .ps-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  .pricing-summary-card .ps-value {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .pricing-summary-card .ps-sub {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.2rem;
  }
  .pricing-summary-card.savings .ps-value { color: var(--booked); }
  .pricing-summary-card.total-now .ps-value { color: var(--accent); }

  .pricing-table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  table.pricing-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .pricing-table thead th {
    background: var(--surface2);
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    white-space: nowrap;
  }
  .pricing-table thead th:nth-child(n+3) { text-align: right; }
  .pricing-table tbody td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  .pricing-table tbody td:nth-child(n+3) { text-align: right; }
  .pricing-table tbody tr:last-child td { border-bottom: none; }
  .pricing-table tbody tr:hover { background: rgba(255,255,255,0.03); }

  .pricing-table .pt-period {
    font-weight: 600;
    white-space: nowrap;
  }
  .pricing-table .pt-dates {
    color: var(--text-dim);
    font-size: 0.8rem;
    white-space: nowrap;
  }
  .pt-list-price {
    color: var(--text-dim);
    text-decoration: line-through;
    font-size: 0.85rem;
  }
  .pt-now-price {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--booked);
  }
  .pt-avg-paid {
    color: var(--text-dim);
    font-size: 0.8rem;
  }
  .pt-savings {
    font-weight: 600;
    color: var(--booked);
    font-size: 0.85rem;
  }
  .pt-discount-badge {
    display: inline-block;
    background: rgba(16, 185, 129, 0.15);
    color: var(--booked);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    white-space: nowrap;
  }
  .pt-discount-badge.deep {
    background: rgba(239, 68, 68, 0.15);
    color: var(--open);
  }

  .pricing-table tfoot td {
    padding: 0.85rem 1rem;
    border-top: 2px solid var(--border);
    font-weight: 700;
    background: var(--surface2);
  }
  .pricing-table tfoot td:nth-child(n+3) { text-align: right; }
  .pricing-table tfoot .ps-total-now { color: var(--accent); font-size: 1.05rem; }
  .pricing-table tfoot .ps-total-save { color: var(--booked); }

  .pricing-bar-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    max-width: 100px;
    margin-left: auto;
  }
  .pricing-bar {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .pricing-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--booked);
    transition: width 0.4s ease;
  }
  .pricing-bar-fill.deep { background: var(--open); }

  .pricing-note {
    margin-top: 1rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .pricing-note strong { color: var(--text); }

  .summary-bar {
    display: flex;
    gap: 0;
    height: 28px;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
  }
  .summary-bar .seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; color: white;
    transition: flex 0.3s;
  }
  .seg-booked { background: var(--booked); }
  .seg-personal { background: var(--personal); }
  .seg-open { background: var(--open); }
  .bar-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); }

  /* Navigation */
  .nav-bar {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--border);
  }
  .nav-tab {
    padding: 0.85rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -2px;
    letter-spacing: 0.01em;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .nav-tab .tab-icon {
    margin-right: 0.5rem;
    font-size: 1rem;
  }
  .page-view { display: none; }
  .page-view.active { display: block; }

  /* Market Research Styles */
  .mr-content { max-width: 960px; }
  .mr-content h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }
  .mr-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .mr-content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
    color: var(--accent);
  }
  .mr-content h4 {
    font-size: 1rem;
    font-weight: 700;
    margin-top: 1.25rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .mr-content p {
    margin-bottom: 0.85rem;
    color: var(--text);
    line-height: 1.7;
  }
  .mr-content strong { color: #fff; }
  .mr-content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(245, 158, 11, 0.3);
    transition: border-color 0.2s;
  }
  .mr-content a:hover { border-bottom-color: var(--accent); }
  .mr-content ul, .mr-content ol {
    margin-bottom: 1rem;
    padding-left: 1.5rem;
  }
  .mr-content li {
    margin-bottom: 0.4rem;
    line-height: 1.6;
  }
  .mr-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }
  .mr-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.25rem;
    font-size: 0.85rem;
  }
  .mr-content thead th {
    background: var(--surface2);
    padding: 0.7rem 0.85rem;
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  .mr-content tbody td {
    padding: 0.65rem 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: top;
    line-height: 1.5;
  }
  .mr-content tbody tr:hover { background: rgba(255,255,255,0.03); }
  .mr-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.75rem 1rem;
    margin: 1rem 0;
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    color: var(--text-dim);
    font-style: italic;
  }
  .mr-content code {
    background: var(--surface2);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.85em;
  }
  .mr-content em { color: var(--text-dim); }

  /* Post Generator Styles */
  .pg-header { margin-bottom: 1.5rem; }
  .pg-header p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; max-width: 800px; }
  .pg-filters {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .pg-filter-btn {
    padding: 0.45rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600;
    border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-dim);
    cursor: pointer; transition: all 0.2s;
  }
  .pg-filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .pg-filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .pg-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem;
  }
  .pg-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; transition: border-color 0.2s; display: flex; flex-direction: column;
  }
  .pg-card:hover { border-color: var(--accent); }
  .pg-card-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); gap: 0.5rem; flex-wrap: wrap;
  }
  .pg-card-badges { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
  .pg-badge {
    display: inline-block; font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; padding: 0.15rem 0.5rem; border-radius: 4px; white-space: nowrap;
  }
  .badge-icp { background: rgba(59,130,246,0.2); color: var(--personal); }
  .badge-tone { background: rgba(139,92,246,0.2); color: var(--moderate); }
  .badge-season { background: rgba(245,158,11,0.2); color: var(--accent); }
  .badge-fishing { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge-family { background: rgba(236,72,153,0.15); color: #ec4899; }
  .badge-nature { background: rgba(16,185,129,0.15); color: var(--booked); }
  .badge-urgency { background: rgba(239,68,68,0.2); color: var(--open); }
  .badge-reunion { background: rgba(245,158,11,0.15); color: var(--accent); }
  .badge-value { background: rgba(99,102,241,0.15); color: #818cf8; }
  .pg-card-target {
    font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
  }
  .pg-card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
  .pg-card-copy {
    font-size: 0.82rem; line-height: 1.65; white-space: pre-wrap; color: var(--text);
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem;
    flex: 1; overflow-y: auto; max-height: 320px;
  }
  .pg-card-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.6rem 1rem; border-top: 1px solid var(--border); background: rgba(0,0,0,0.12);
  }
  .pg-card-info { font-size: 0.7rem; color: var(--text-dim); }
  .pg-copy-btn {
    padding: 0.4rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600;
    background: var(--accent); color: var(--bg); border: none; border-radius: 6px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .pg-copy-btn:hover { opacity: 0.85; }
  .pg-copy-btn.copied { background: var(--booked); }
  .pg-icp-section { margin-bottom: 2.5rem; }
  .pg-icp-title {
    font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700;
    margin-bottom: 0.35rem; color: var(--text);
  }
  .pg-icp-desc { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 1rem; line-height: 1.5; }

  @media (max-width: 800px) {
    body { padding: 1rem; }
    h1 { font-size: 1.5rem; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .gap-detail-grid { grid-template-columns: 1fr; }
    .nav-tab { padding: 0.7rem 1rem; font-size: 0.82rem; }
    .pg-post-header { flex-direction: column; }
  }
</style>
</head>
<body>

<h1>Island View Retreat <span>2026</span></h1>
<p class="subtitle">Operations Dashboard &bull; Generated Mar 18, 2026</p>

<nav class="nav-bar">
  <button class="nav-tab active" onclick="switchTab('bookings')"><span class="tab-icon">&#9744;</span>Booking Gap Analysis</button>
  <button class="nav-tab" onclick="switchTab('research')"><span class="tab-icon">&#9783;</span>Market Research</button>
  <button class="nav-tab" onclick="switchTab('posts')"><span class="tab-icon">&#9998;</span>Post Generator</button>
</nav>

<div id="page-bookings" class="page-view active">
  <div id="app"></div>

function switchTab(tab) {

function getSeasonKey(month) {
  if (month === "May") return "spring";
  if (month === "Jun") return "earlySummer";
  if (month === "Jul") return "peakSummer";
  if (month === "Aug") return "lateSummer";
  return "fall";
}

function perFamilyNight(weeklyPrice, families) {
  const f = families || 3;
  return Math.round(weeklyPrice / f / 7);
}

function getPostDate(gapDates, weeksOut) {
  const parts = gapDates.split("-")[0].trim().split(" ");
  const monthMap = { May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9 };
  const m = monthMap[parts[0]] || 5;
  const d = parseInt(parts[1]) || 1;
  const dt = new Date(2026, m, d);
  dt.setDate(dt.getDate() - weeksOut * 7);
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[dt.getMonth()]} ${dt.getDate()}`;
}

  gaps.forEach(g => {
    const sk = getSeasonKey(g.month);
    const pri = g.pri;
    if (pri === "CRITICAL" || pri === "HIGH") {
      posts.push({ icp: "value", tone: "urgency", season: sk,
        copy: `${weekRange(g)} on Big Gull Lake is still open.\n\n$${g.now.toLocaleString()}/week for our 5-bedroom lakefront cottage. Sleeps 16. Private sandy beach, canoes, kayaks, paddleboards, fire pit, BBQ, screened porch, A/C, WiFi \u2014 everything\u2019s included.\n\nCamp\u2019s Bay Marina is next door for boat rentals, bait, and fuel.\n\nSplit between 3 families that\u2019s about $${perFamilyNight(g.now, 3)}/night each.\n\n34 five-star reviews over 5 seasons.\n\n${LINK}`,
        postDate: getPostDate(g.dates26, 2), promotes: weekRange(g)
      });
    }
  });

  // ==========================
  // SEASONAL CAMPAIGN POSTS
  // ==========================

  if (fallGaps.length > 0) {
    posts.push({ icp: "nature", tone: "experiential", season: "fall",
      copy: `Fall is honestly one of my favourite times to be at the cottage. The trees around Big Gull Lake are incredible this time of year, the fishing is still great, there are no bugs, and the lake is quiet and peaceful.\n\nIf you\u2019ve never done a fall cottage trip, I\u2019d really recommend it. The colours on the islands are stunning and you\u2019ll pretty much have the lake to yourself.\n\n5 bedrooms, private sandy beach, fire pit, sleeps 16.\n\nFall weeks from $${Math.min(...fallGaps.map(g=>g.now)).toLocaleString()}/week.\n\n${LINK}`,
      postDate: new Date(2026, 7, 15), promotes: "All fall gap weeks"
    });
  }

  if (summerGaps.length > 0) {
    posts.push({ icp: "families", tone: "urgency", season: "peakSummer",
      copy: `Summer weeks are filling up \u2014 here\u2019s what we still have open at our cottage on Big Gull Lake:\n\n${summerGaps.map(g => `\u2022 ${weekRange(g)} \u2014 $${g.now.toLocaleString()}/week`).join('\n')}\n\nPrivate sandy beach, 5 bedrooms + bunkie, sleeps 16. 30+ islands to explore. Everything\u2019s included.\n\n34 five-star reviews. A lot of our families come back year after year.\n\n${LINK}`,
      postDate: new Date(2026, 4, 15), promotes: "Summer gap weeks"
    });
  }


  return posts.sort((a, b) => {
    const da = a.postDate instanceof Date ? a.postDate : new Date(a.postDate);
    const db = b.postDate instanceof Date ? b.postDate : new Date(b.postDate);
    return da - db;
  });
}


let postsRendered = false;
let currentIcpFilter = "all";
let currentToneFilter = "all";

function renderPosts() {
  if (postsRendered && !arguments[0]) return;
  postsRendered = true;

  const allPosts = generateAllPosts();
  const container = document.getElementById("posts-content");

  let filtered = allPosts;
  if (currentIcpFilter !== "all") filtered = filtered.filter(p => p.icp === currentIcpFilter);
  if (currentToneFilter !== "all") filtered = filtered.filter(p => p.tone === currentToneFilter);

  let html = "";

  html += `<div class="pg-header">
    <div class="section-title">Post Generator &mdash; ICP &times; Messaging Grid</div>
    <p>Posts organized by <strong>Ideal Customer Profile</strong> and <strong>messaging tone</strong>. Each post is research-backed with real facts about Big Gull Lake, Camp&rsquo;s Bay Marina, and Island View Retreat. Filter by audience or tone, then copy any post directly.</p>
  </div>`;

  const gapCount = DATA.weeks.filter(w => w.gap).length;
  html += `<div class="stats-row">
    <div class="stat-card highlight"><div class="label">Total Posts</div><div class="value">${allPosts.length}</div><div class="sub">across ${ICPS.length} ICPs &times; ${TONES.length} tones</div></div>
    <div class="stat-card"><div class="label">ICPs Covered</div><div class="value">${ICPS.length}</div><div class="sub">families, anglers, nature, reunion, value, detox</div></div>
    <div class="stat-card"><div class="label">Gap Weeks</div><div class="value">${gapCount}</div><div class="sub">targeted with specific pricing</div></div>
    <div class="stat-card"><div class="label">Cadence</div><div class="value">1&ndash;2/wk</div><div class="sub">rotate ICPs &amp; tones</div></div>
  </div>`;

  // ICP filters
  html += `<div style="margin-bottom:0.5rem;font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">Audience</div>`;
  html += `<div class="pg-filters">`;
  html += `<button class="pg-filter-btn${currentIcpFilter==='all'?' active':''}" onclick="filterByIcp('all')">All (${allPosts.length})</button>`;
  for (const icp of ICPS) {
    const count = allPosts.filter(p => p.icp === icp.id).length;
    html += `<button class="pg-filter-btn${currentIcpFilter===icp.id?' active':''}" onclick="filterByIcp('${icp.id}')">${icp.emoji} ${icp.title} (${count})</button>`;
  }
  html += `</div>`;

  // Tone filters
  html += `<div style="margin-bottom:0.5rem;font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">Tone</div>`;
  html += `<div class="pg-filters" style="margin-bottom:2rem">`;
  html += `<button class="pg-filter-btn${currentToneFilter==='all'?' active':''}" onclick="filterByTone('all')">All Tones</button>`;
  for (const t of TONES) {
    const count = allPosts.filter(p => p.tone === t.id).length;
    html += `<button class="pg-filter-btn${currentToneFilter===t.id?' active':''}" onclick="filterByTone('${t.id}')">${t.label} (${count})</button>`;
  }
  html += `</div>`;

  // Group by ICP
  const icpOrder = currentIcpFilter === "all" ? ICPS : ICPS.filter(i => i.id === currentIcpFilter);
  for (const icp of icpOrder) {
    const icpPosts = filtered.filter(p => p.icp === icp.id);
    if (icpPosts.length === 0) continue;

    html += `<div class="pg-icp-section">`;
    html += `<div class="pg-icp-title">${icp.emoji} ${icp.title}</div>`;
    html += `<div class="pg-icp-desc">${icp.desc}</div>`;
    html += `<div class="pg-grid">`;

    for (let i = 0; i < icpPosts.length; i++) {
      const p = icpPosts[i];
      const globalIdx = allPosts.indexOf(p);
      const wordCount = p.copy.split(/\s+/).length;
      const toneObj = TONES.find(t => t.id === p.tone) || TONES[0];
      const postDateStr = p.postDate instanceof Date
        ? p.postDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })
        : p.postDate;

      html += `<div class="pg-card">
        <div class="pg-card-top">
          <div class="pg-card-badges">
            <span class="pg-badge ${icp.badgeClass}">${icp.id}</span>
            <span class="pg-badge ${toneObj.badgeClass}">${toneObj.label}</span>
            <span class="pg-badge badge-season">${p.season}</span>
          </div>
          <div class="pg-card-target">Post by ${postDateStr}</div>
        </div>
        <div class="pg-card-body">
          <div class="pg-card-copy" id="post-copy-${globalIdx}">${p.copy}</div>
        </div>
        <div class="pg-card-footer">
          <span class="pg-card-info">${wordCount} words &bull; Promotes: ${p.promotes}</span>
          <button class="pg-copy-btn" onclick="copyPost(${globalIdx}, this)">Copy</button>
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function filterByIcp(icp) {
  currentIcpFilter = icp;
  renderPosts(true);
}
function filterByTone(tone) {
  currentToneFilter = tone;
  renderPosts(true);
}

function copyPost(index, btn) {
  const el = document.getElementById("post-copy-" + index);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

## 8. Strategic Implications

### 8.1 What the Data Says You Should Do

1. **Lead with per-family pricing in all marketing** \u2014 Reframe from "$4,450/week" to "~$159/family/night" to reduce sticker shock and match 2026 buyer psychology
2. **Communicate the spring-to-summer savings gap** \u2014 The 43\u201362% discount vs peak summer is your strongest marketing hook and it\u2019s currently buried
3. **Leverage the review advantage** \u2014 34 five-star reviews with a perfect 5.0 is rare and credible; George\u2019s "4 families, 16 people" review is the perfect testimonial for your target market
4. **Own the "only large-group option on Big Gull Lake" positioning** \u2014 This is a genuine competitive moat that should be stated explicitly
5. **Expect and plan for later bookings** \u2014 The market has shifted to shorter booking windows; this isn\u2019t a problem with your property, it\u2019s a market-wide behavior change
6. **Target fishing groups specifically** \u2014 Fishing-oriented guests are less price-sensitive, less seasonal, and more likely to book; Big Gull Lake has confirmed walleye, bass, and pike
7. **Monitor for regulatory changes** \u2014 North Frontenac\u2019s hands-off approach is an advantage today, but the provincial trend is clearly toward more regulation

### 8.2 What the Data Says You Should Not Do

1. **Don\u2019t panic-discount to fill calendar** \u2014 The market hasn\u2019t collapsed; top-tier properties are still booking. Your reviews and positioning put you in the "quality" tier.
2. **Don\u2019t compare to 2021\u20132023 booking pace** \u2014 That era was anomalous. A 15\u201330% decline in booking velocity from the COVID peak is the new normal, not a crisis.
3. **Don\u2019t rely on passive listing exposure** \u2014 In 2026, "be available" is not a strategy. Active Facebook marketing, group targeting, and experience-led content are required.
