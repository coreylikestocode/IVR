<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island View Retreat — 2026 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2332;
    --surface2: #243044;
    --border: #2d3f56;
    --text: #e8edf3;
    --text-dim: #8899aa;
    --booked: #10b981;
    --booked-bg: rgba(16, 185, 129, 0.12);
    --personal: #3b82f6;
    --personal-bg: rgba(59, 130, 246, 0.12);
    --open: #ef4444;
    --open-bg: rgba(239, 68, 68, 0.10);
    --critical: #f59e0b;
    --critical-bg: rgba(245, 158, 11, 0.15);
    --high: #f97316;
    --moderate: #8b5cf6;
    --low: #6b7280;
    --accent: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .stat-card .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.25rem; }
  .stat-card .sub { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.15rem; }
  .stat-card.highlight { border-color: var(--accent); }
  .stat-card.highlight .value { color: var(--accent); }
  .stat-card.danger { border-color: var(--open); }
  .stat-card.danger .value { color: var(--open); }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    font-size: 0.85rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 3px;
  }
  .legend-dot.booked { background: var(--booked); }
  .legend-dot.personal { background: var(--personal); }
  .legend-dot.open { background: var(--open); }
  .legend-dot.gap-critical { background: var(--critical); }

  .grid-container { overflow-x: auto; margin-bottom: 2rem; }
  table.booking-grid {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.82rem;
  }
  table.booking-grid th {
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 0.75rem 0.6rem;
    text-align: left;
    position: sticky;
    top: 0;
    z-index: 2;
    border-bottom: 2px solid var(--border);
  }
  table.booking-grid th:first-child { border-radius: 8px 0 0 0; }
  table.booking-grid th:last-child { border-radius: 0 8px 0 0; }
  table.booking-grid th.year-2026 { color: var(--accent); border-bottom-color: var(--accent); }

  table.booking-grid td {
    padding: 0.55rem 0.6rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    white-space: nowrap;
  }
  table.booking-grid tr:last-child td { border-bottom: none; }
  table.booking-grid td.period-cell {
    font-weight: 700;
    color: var(--text);
    min-width: 110px;
    background: var(--surface);
    position: sticky;
    left: 0;
    z-index: 1;
  }
  table.booking-grid td.dates-cell {
    color: var(--text-dim);
    font-size: 0.75rem;
    min-width: 85px;
  }

  .cell-booked { background: var(--booked-bg); border-left: 3px solid var(--booked); }
  .cell-personal { background: var(--personal-bg); border-left: 3px solid var(--personal); }
  .cell-open { background: transparent; border-left: 3px solid transparent; }
  .cell-gap { background: var(--open-bg); border-left: 3px solid var(--open); }
  .cell-gap-critical { background: var(--critical-bg); border-left: 3px solid var(--critical); }

  .cell-guest { font-weight: 500; display: block; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .cell-revenue { color: var(--booked); font-weight: 700; font-size: 0.78rem; }
  .cell-revenue.personal { color: var(--personal); }
  .cell-revenue.none { color: var(--text-dim); }
  .cell-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    margin-top: 0.2rem;
  }
  .tag-critical { background: rgba(245,158,11,0.2); color: var(--critical); }
  .tag-high { background: rgba(249,115,22,0.2); color: var(--high); }
  .tag-moderate { background: rgba(139,92,246,0.2); color: var(--moderate); }
  .tag-low { background: rgba(107,114,128,0.2); color: var(--low); }

  .gap-detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  .gap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    transition: border-color 0.2s;
  }
  .gap-card:hover { border-color: var(--accent); }
  .gap-card.priority-CRITICAL { border-left: 4px solid var(--critical); }
  .gap-card.priority-HIGH { border-left: 4px solid var(--high); }
  .gap-card.priority-MODERATE { border-left: 4px solid var(--moderate); }
  .gap-card.priority-LOW { border-left: 4px solid var(--low); }
  .gap-card .gc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
  .gap-card .gc-period { font-weight: 700; font-size: 1rem; }
  .gap-card .gc-dates { color: var(--text-dim); font-size: 0.8rem; }
  .gap-card .gc-list-rate { color: var(--text-dim); font-size: 0.85rem; }
  .gap-card .gc-list-rate strong { color: var(--text); }
  .gap-card .gc-history { margin-top: 0.5rem; }
  .gc-history-row {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    font-size: 0.8rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .gc-history-row:last-child { border-bottom: none; }
  .gc-history-row .yr { color: var(--text-dim); width: 40px; }
  .gc-history-row .guest { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gc-history-row .rev { font-weight: 600; min-width: 65px; text-align: right; }
  .gc-history-row .rev.paid { color: var(--booked); }
  .gc-history-row .rev.zero { color: var(--text-dim); }
  .gc-stats { display: flex; gap: 1rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .gc-stat { text-align: center; flex: 1; }
  .gc-stat .val { font-size: 1.1rem; font-weight: 700; }
  .gc-stat .lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }

  /* Pricing Section */
  .pricing-section {
    margin-top: 2rem;
  }
  .pricing-summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .pricing-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
  }
  .pricing-summary-card .ps-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  .pricing-summary-card .ps-value {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .pricing-summary-card .ps-sub {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.2rem;
  }
  .pricing-summary-card.savings .ps-value { color: var(--booked); }
  .pricing-summary-card.total-now .ps-value { color: var(--accent); }

  .pricing-table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  table.pricing-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .pricing-table thead th {
    background: var(--surface2);
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    white-space: nowrap;
  }
  .pricing-table thead th:nth-child(n+3) { text-align: right; }
  .pricing-table tbody td {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  .pricing-table tbody td:nth-child(n+3) { text-align: right; }
  .pricing-table tbody tr:last-child td { border-bottom: none; }
  .pricing-table tbody tr:hover { background: rgba(255,255,255,0.03); }

  .pricing-table .pt-period {
    font-weight: 600;
    white-space: nowrap;
  }
  .pricing-table .pt-dates {
    color: var(--text-dim);
    font-size: 0.8rem;
    white-space: nowrap;
  }
  .pt-list-price {
    color: var(--text-dim);
    text-decoration: line-through;
    font-size: 0.85rem;
  }
  .pt-now-price {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--booked);
  }
  .pt-avg-paid {
    color: var(--text-dim);
    font-size: 0.8rem;
  }
  .pt-savings {
    font-weight: 600;
    color: var(--booked);
    font-size: 0.85rem;
  }
  .pt-discount-badge {
    display: inline-block;
    background: rgba(16, 185, 129, 0.15);
    color: var(--booked);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    white-space: nowrap;
  }
  .pt-discount-badge.deep {
    background: rgba(239, 68, 68, 0.15);
    color: var(--open);
  }

  .pricing-table tfoot td {
    padding: 0.85rem 1rem;
    border-top: 2px solid var(--border);
    font-weight: 700;
    background: var(--surface2);
  }
  .pricing-table tfoot td:nth-child(n+3) { text-align: right; }
  .pricing-table tfoot .ps-total-now { color: var(--accent); font-size: 1.05rem; }
  .pricing-table tfoot .ps-total-save { color: var(--booked); }

  .pricing-bar-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    max-width: 100px;
    margin-left: auto;
  }
  .pricing-bar {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .pricing-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--booked);
    transition: width 0.4s ease;
  }
  .pricing-bar-fill.deep { background: var(--open); }

  .pricing-note {
    margin-top: 1rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .pricing-note strong { color: var(--text); }

  .summary-bar {
    display: flex;
    gap: 0;
    height: 28px;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
  }
  .summary-bar .seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; color: white;
    transition: flex 0.3s;
  }
  .seg-booked { background: var(--booked); }
  .seg-personal { background: var(--personal); }
  .seg-open { background: var(--open); }
  .bar-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-dim); }

  /* Navigation */
  .nav-bar {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--border);
  }
  .nav-tab {
    padding: 0.85rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -2px;
    letter-spacing: 0.01em;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .nav-tab .tab-icon {
    margin-right: 0.5rem;
    font-size: 1rem;
  }
  .page-view { display: none; }
  .page-view.active { display: block; }

  /* Market Research Styles */
  .mr-content { max-width: 960px; }
  .mr-content h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }
  .mr-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .mr-content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
    color: var(--accent);
  }
  .mr-content h4 {
    font-size: 1rem;
    font-weight: 700;
    margin-top: 1.25rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .mr-content p {
    margin-bottom: 0.85rem;
    color: var(--text);
    line-height: 1.7;
  }
  .mr-content strong { color: #fff; }
  .mr-content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(245, 158, 11, 0.3);
    transition: border-color 0.2s;
  }
  .mr-content a:hover { border-bottom-color: var(--accent); }
  .mr-content ul, .mr-content ol {
    margin-bottom: 1rem;
    padding-left: 1.5rem;
  }
  .mr-content li {
    margin-bottom: 0.4rem;
    line-height: 1.6;
  }
  .mr-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }
  .mr-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1.25rem;
    font-size: 0.85rem;
  }
  .mr-content thead th {
    background: var(--surface2);
    padding: 0.7rem 0.85rem;
    text-align: left;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  .mr-content tbody td {
    padding: 0.65rem 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    vertical-align: top;
    line-height: 1.5;
  }
  .mr-content tbody tr:hover { background: rgba(255,255,255,0.03); }
  .mr-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.75rem 1rem;
    margin: 1rem 0;
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    color: var(--text-dim);
    font-style: italic;
  }
  .mr-content code {
    background: var(--surface2);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.85em;
  }
  .mr-content em { color: var(--text-dim); }

  /* Post Generator Styles */
  .pg-header { margin-bottom: 2rem; }
  .pg-header p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; max-width: 720px; }

  .pg-filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .pg-filter-btn {
    padding: 0.45rem 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .pg-filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .pg-filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .pg-timeline {
    position: relative;
    padding: 1rem 0 1rem 1.5rem;
    margin-bottom: 2rem;
  }
  .pg-timeline::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .pg-tl-month {
    position: relative;
    margin-bottom: 1.5rem;
  }
  .pg-tl-month-label {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
    padding-left: 1.5rem;
    color: var(--accent);
  }
  .pg-tl-month-label::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.45rem;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    z-index: 1;
  }
  .pg-tl-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.5rem 0 0.5rem 1.5rem;
    font-size: 0.82rem;
    position: relative;
  }
  .pg-tl-item::before {
    content: '';
    position: absolute;
    left: 2px;
    top: 0.85rem;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    z-index: 1;
  }
  .pg-tl-date { color: var(--text-dim); min-width: 70px; flex-shrink: 0; }
  .pg-tl-desc { flex: 1; }
  .pg-tl-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.12rem 0.45rem;
    border-radius: 4px;
    margin-right: 0.4rem;
    vertical-align: middle;
  }
  .badge-campaign { background: rgba(59,130,246,0.2); color: var(--personal); }
  .badge-spotlight { background: rgba(245,158,11,0.2); color: var(--accent); }
  .badge-urgency { background: rgba(239,68,68,0.2); color: var(--open); }
  .badge-testimonial { background: rgba(16,185,129,0.2); color: var(--booked); }
  .badge-experience { background: rgba(139,92,246,0.2); color: var(--moderate); }
  .badge-fishing { background: rgba(34,197,94,0.15); color: #22c55e; }

  .pg-posts-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
  }

  .pg-post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .pg-post-card:hover { border-color: var(--accent); }

  .pg-post-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
    flex-wrap: wrap;
  }
  .pg-post-meta { display: flex; flex-direction: column; gap: 0.35rem; }
  .pg-post-type-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .pg-post-target {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .pg-post-date-rec {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .pg-post-date-rec strong { color: var(--text); }
  .pg-post-promotes {
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .pg-post-body {
    padding: 1.25rem;
  }
  .pg-post-copy {
    font-size: 0.88rem;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    position: relative;
  }

  .pg-post-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;

  let html = "";

  // Stats cards
  html += `<div class="stats-row">

    <div class="stat-card danger"><div class="label">Open Gap Weeks</div><div class="value">${openWeeks26}</div><div class="sub">${gaps.filter(g=>g.pri==="CRITICAL").length} critical priority</div></div>
    <div class="stat-card highlight"><div class="label">Gap Revenue Potential</div><div class="value">~$${totalNow.toLocaleString()}</div><div class="sub">at optimized listing prices</div></div>
    <div class="stat-card"><div class="label">Target if Filled</div><div class="value">~$${(DATA.yearly[2026].revenue + totalNow).toLocaleString()}</div><div class="sub">vs 2025: $${DATA.yearly[2025].revenue.toLocaleString()}</div></div>
  </div>`;

  // Occupancy bar
  html += `<div class="summary-bar">
    <div class="seg seg-booked" style="flex:${bookedWeeks26}">${bookedWeeks26} booked</div>
    <div class="seg seg-personal" style="flex:${personalWeeks26}">${personalWeeks26} personal</div>
    <div class="seg seg-open" style="flex:${openWeeks26}">${openWeeks26} open</div>
  </div>
  <div class="bar-labels"><span>${totalWeeks} season weeks total</span><span>${Math.round(bookedWeeks26/totalWeeks*100)}% booked occupancy</span></div>`;

  // 5-Year comparison grid
  html += `<div class="section-title">5-Year Booking Comparison Grid</div>`;
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot booked"></div>Paid Booking</div>
    <div class="legend-item"><div class="legend-dot personal"></div>Personal Use</div>
    <div class="legend-item"><div class="legend-dot open"></div>2026 Gap Week</div>

  </tr></thead><tbody>`;

  for (const w of DATA.weeks) {
    const is2026Gap = w.gap;

    html += `<tr>`;
    html += `<td class="period-cell">${w.period}</td>`;
    html += `<td class="dates-cell">${w.dates26}</td>`;

      let cellClass = "";

        cellClass = w.pri === "CRITICAL" ? "cell-gap-critical" : "cell-gap";

        cellClass = "cell-booked";

      html += `<td class="${cellClass}"><span class="cell-guest">${guestLabel}</span><span class="cell-revenue ${revClass}">${revLabel}</span></td>`;

    html += `</tr>`;

        <span class="yr">${yr}</span>
        <span class="guest">${label}</span>

  }

  html += `</tbody><tfoot><tr>

    soft periods. <strong>Building weeks</strong> (Jun) step up gradually from $2,950 to $3,950 as demand increases.

    season closes. All prices are anchored to historical averages to remain competitive and realistic.

  html += `</div>`;

  app.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
  const tabs = document.querySelectorAll('.nav-tab');
  if (tab === 'bookings') {
    tabs[0].classList.add('active');
    document.getElementById('page-bookings').classList.add('active');
  } else if (tab === 'research') {
    tabs[1].classList.add('active');
    document.getElementById('page-research').classList.add('active');
    renderResearch();
  } else if (tab === 'posts') {
    tabs[2].classList.add('active');
    document.getElementById('page-posts').classList.add('active');
    renderPosts();
  }
}

function perFamilyNight(weeklyPrice) {

function getPostDate(gapDates, weeksOut) {
  const parts = gapDates.split("-")[0].trim().split(" ");

  const m = monthMap[parts[0]] || 5;

  dt.setDate(dt.getDate() - weeksOut * 7);
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[dt.getMonth()]} ${dt.getDate()}`;

      html += `<div class="pg-tl-item">

        <span class="pg-tl-desc"><span class="pg-tl-badge ${item.badgeClass}">${item.badge}</span> ${item.promotes}</span>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // Post cards
  html += `<div class="section-title">Generated Posts (${filtered.length})</div>`;
  html += `<div class="pg-posts-grid">`;
  for (let i = 0; i < filtered.length; i++) {
    const p = filtered[i];
    const wordCount = p.copy.split(/\s+/).length;
    const priClass = p.priority ? `tag-${p.priority.toLowerCase()}` : "tag-low";

    html += `<div class="pg-post-card">
      <div class="pg-post-header">
        <div class="pg-post-meta">
          <div class="pg-post-type-row">
            <span class="pg-tl-badge ${p.badgeClass}">${p.badge}</span>
            ${p.priority && p.priority !== "LOW" ? `<span class="cell-tag ${priClass}">${p.priority}</span>` : ''}
          </div>
          <div class="pg-post-target">Target: ${p.target}</div>
        </div>
        <div style="text-align:right">
          <div class="pg-post-date-rec">Post by: <strong>${p.postDate}</strong></div>
          <div class="pg-post-promotes">Promotes: ${p.promotes}</div>
        </div>
      </div>
      <div class="pg-post-body">
        <div class="pg-post-copy" id="post-copy-${i}">${p.copy}</div>
        <div class="pg-photo-hint">\u{1F4F7} ${p.photo}</div>
      </div>
      <div class="pg-post-footer">
        <span class="pg-post-footer-info">${wordCount} words</span>
        <button class="pg-copy-btn" onclick="copyPost(${i}, this)">Copy to Clipboard</button>
      </div>
    </div>`;
  }
  html += `</div>`;

  container.innerHTML = html;
}

function filterPosts(type) {
  currentFilter = type;
  renderPosts(true);
}

function copyPost(index, btn) {
  const el = document.getElementById("post-copy-" + index);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy to Clipboard"; btn.classList.remove("copied"); }, 2000);
  });
}

## 8. Strategic Implications

### 8.1 What the Data Says You Should Do

1. **Lead with per-family pricing in all marketing** \u2014 Reframe from "$4,450/week" to "~$159/family/night" to reduce sticker shock and match 2026 buyer psychology
2. **Communicate the spring-to-summer savings gap** \u2014 The 43\u201362% discount vs peak summer is your strongest marketing hook and it\u2019s currently buried
3. **Leverage the review advantage** \u2014 34 five-star reviews with a perfect 5.0 is rare and credible; George\u2019s "4 families, 16 people" review is the perfect testimonial for your target market
4. **Own the "only large-group option on Big Gull Lake" positioning** \u2014 This is a genuine competitive moat that should be stated explicitly
5. **Expect and plan for later bookings** \u2014 The market has shifted to shorter booking windows; this isn\u2019t a problem with your property, it\u2019s a market-wide behavior change
6. **Target fishing groups specifically** \u2014 Fishing-oriented guests are less price-sensitive, less seasonal, and more likely to book; Big Gull Lake has confirmed walleye, bass, and pike
7. **Monitor for regulatory changes** \u2014 North Frontenac\u2019s hands-off approach is an advantage today, but the provincial trend is clearly toward more regulation

### 8.2 What the Data Says You Should Not Do

1. **Don\u2019t panic-discount to fill calendar** \u2014 The market hasn\u2019t collapsed; top-tier properties are still booking. Your reviews and positioning put you in the "quality" tier.
2. **Don\u2019t compare to 2021\u20132023 booking pace** \u2014 That era was anomalous. A 15\u201330% decline in booking velocity from the COVID peak is the new normal, not a crisis.
3. **Don\u2019t rely on passive listing exposure** \u2014 In 2026, "be available" is not a strategy. Active Facebook marketing, group targeting, and experience-led content are required.
